# ==============================================
# Ghostty Warp - tmux Configuration
# ==============================================
# A curated tmux config matching ghostty-warp aesthetics
# Install: ln -s ~/.config/ghostty/tmux/tmux.conf ~/.tmux.conf

# ============================================
# General Settings
# ============================================

# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase history limit
set -g history-limit 50000

# Reduce escape time (for vim)
set -sg escape-time 10

# Focus events (for vim autoread)
set -g focus-events on

# ============================================
# Key Bindings
# ============================================

# Change prefix to Ctrl-a (like screen)
# Uncomment if you prefer this over Ctrl-b
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Quick window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Copy mode with vi keys
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ============================================
# Status Bar
# ============================================

# Status bar position
set -g status-position bottom

# Update status every second
set -g status-interval 1

# Status bar colors (Tokyo Night inspired)
set -g status-style 'bg=#1a1b26 fg=#a9b1d6'

# Left status
set -g status-left-length 50
set -g status-left '#[fg=#7aa2f7,bold] #S #[fg=#565f89]|'

# Right status
set -g status-right-length 100
set -g status-right '#[fg=#565f89]| #[fg=#9ece6a]%H:%M #[fg=#565f89]| #[fg=#bb9af7]%d-%b'

# Window status
setw -g window-status-format '#[fg=#565f89] #I:#W '
setw -g window-status-current-format '#[fg=#7aa2f7,bold] #I:#W '

# Pane borders
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#7aa2f7'

# Message style
set -g message-style 'bg=#1a1b26 fg=#7aa2f7 bold'

# ============================================
# Plugins (optional - requires TPM)
# ============================================

# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

# List of plugins
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

