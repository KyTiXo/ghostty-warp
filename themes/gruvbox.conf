# Gruvbox Theme — Retro warmth
# Warm earthy colors, easy on the eyes

theme = Gruvbox Dark

font-family = "JetBrainsMono Nerd Font"
font-size = 11
font-thicken = true

window-padding-x = 14
window-padding-y = 10

cursor-style = block
cursor-opacity = 0.95

minimum-contrast = 1.0

selection-background = #504945
