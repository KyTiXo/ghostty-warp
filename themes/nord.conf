# Nord Theme — Arctic minimalism
# Clean Scandinavian palette, calming blues

theme = Nord

font-family = "JetBrainsMono Nerd Font"
font-size = 11
font-thicken = true

window-padding-x = 6
window-padding-y = 4

cursor-style = bar
cursor-opacity = 1.0

minimum-contrast = 1.1

selection-background = #434c5e
