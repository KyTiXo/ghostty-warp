# Tokyo Night Theme — Cyberpunk vibes
# Deep blues, electric accents, neon highlights

theme = TokyoNight

font-family = "JetBrainsMono Nerd Font"
font-size = 11
font-thicken = true

window-padding-x = 15
window-padding-y = 10

cursor-style = block
cursor-opacity = 0.9

minimum-contrast = 1.2

selection-background = #364a82
