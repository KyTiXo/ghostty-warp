# Dracula Theme — Classic gothic elegance
# Purple-accented dark theme with warm highlights

theme = Dracula

font-family = "JetBrainsMono Nerd Font"
font-size = 11
font-thicken = false

window-padding-x = 12
window-padding-y = 8

cursor-style = underline
cursor-opacity = 1.0

minimum-contrast = 1.0

selection-background = #44475a
