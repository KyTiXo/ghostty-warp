# Catppuccin Mocha Theme — Cozy pastels
# Soothing pastel colors on a warm dark background

theme = catppuccin-mocha

font-family = "JetBrainsMono Nerd Font"
font-size = 11
font-thicken = true

window-padding-x = 14
window-padding-y = 12

cursor-style = block
cursor-opacity = 0.95

minimum-contrast = 1.1

selection-background = #45475a
