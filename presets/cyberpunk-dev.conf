# Cyberpunk Dev Preset — Tokyo Night + Fira Code
# For: Modern web dev, React/TypeScript, futuristic coding

theme = TokyoNight

font-family = "FiraCode Nerd Font"
font-size = 11
font-thicken = false
font-feature = +calt,+liga,+dlig,+ss01,+ss02,+ss03,+ss04,+ss05

grapheme-width-method = unicode

window-padding-x = 16
window-padding-y = 12

cursor-style = bar
cursor-opacity = 0.9

minimum-contrast = 1.2

selection-background = #364a82
