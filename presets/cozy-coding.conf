# Cozy Coding Preset — Gruvbox + JetBrains Mono
# For: Long sessions, eye comfort, all-day development

theme = Gruvbox Dark

font-family = "JetBrainsMono Nerd Font"
font-size = 11
font-thicken = true

grapheme-width-method = unicode

window-padding-x = 14
window-padding-y = 10

cursor-style = block
cursor-opacity = 0.95

minimum-contrast = 1.0

selection-background = #504945
