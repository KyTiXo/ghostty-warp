# Minimal Focus Preset — Nord + Iosevka
# For: Distraction-free coding, maximum code density

theme = Nord

font-family = "Iosevka Nerd Font"
font-size = 11
font-thicken = true
font-feature = +calt,+liga

grapheme-width-method = unicode

window-padding-x = 6
window-padding-y = 4

cursor-style = bar
cursor-opacity = 1.0

minimum-contrast = 1.1

selection-background = #434c5e
