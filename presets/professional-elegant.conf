# Professional Elegant Preset — Dracula + Cascadia Code
# For: Professional dev, client demos, sophisticated look

theme = Dracula

font-family = "CaskaydiaCove Nerd Font"
font-size = 11
font-thicken = false
font-feature = +calt,+liga,+ss01

grapheme-width-method = unicode

window-padding-x = 12
window-padding-y = 8

cursor-style = underline
cursor-opacity = 1.0

minimum-contrast = 1.0

selection-background = #44475a
